<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <!-- Row 1 -->
      <button class="btn fn" onclick="clearAll()">AC</button>
      <button class="btn fn" onclick="deleteLast()">⌫</button>
      <button class="btn fn" onclick="appendParen()">( )</button>
      <button class="btn operator" onclick="appendOp('/')">÷</button>

      <!-- Row 2 -->
      <button class="btn fn" onclick="applyPercent()">%</button>
      <button class="btn fn" onclick="applySquare()">x²</button>
      <button class="btn fn" onclick="applySqrt()">√</button>
      <button class="btn fn" onclick="applyReciprocal()">1/x</button>

      <!-- Row 3 -->
      <button class="btn" onclick="appendNum('7')">7</button>
      <button class="btn" onclick="appendNum('8')">8</button>
      <button class="btn" onclick="appendNum('9')">9</button>
      <button class="btn operator" onclick="appendOp('*')">×</button>

      <!-- Row 4 -->
      <button class="btn" onclick="appendNum('4')">4</button>
      <button class="btn" onclick="appendNum('5')">5</button>
      <button class="btn" onclick="appendNum('6')">6</button>
      <button class="btn operator" onclick="appendOp('-')">−</button>

      <!-- Row 5 -->
      <button class="btn" onclick="appendNum('1')">1</button>
      <button class="btn" onclick="appendNum('2')">2</button>
      <button class="btn" onclick="appendNum('3')">3</button>
      <button class="btn operator" onclick="appendOp('+')">+</button>

      <!-- Row 6 -->
      <button class="btn" onclick="toggleSign()">+/−</button>
      <button class="btn" onclick="appendNum('0')">0</button>
      <button class="btn" onclick="appendDot()">.</button>
      <button class="btn equals" onclick="calculate()">=</button>
    </div>
  </div>
  <script src="calc.js"></script>
</body>
</html>
